<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿 精算ダッシュボード</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      max-width: 700px;
      margin: 0 auto;
      padding: 16px;
      background: #f5f5f5;
    }

    h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 22px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 16px;
    }

    .card h2 { margin-top: 0; font-size: 16px; color: #333; }

    .year-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .year-tab {
      padding: 6px 16px;
      border: 2px solid #1976D2;
      border-radius: 20px;
      background: white;
      color: #1976D2;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .year-tab:hover { background: #e3f2fd; }
    .year-tab.active { background: #1976D2; color: white; }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-bottom: 20px;
    }
    .month-btn {
      padding: 8px 4px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      text-align: center;
    }
    .month-btn:hover { background: #e3f2fd; border-color: #1976D2; }
    .month-btn.active { background: #1976D2; color: white; border-color: #1976D2; }
    .month-btn.disabled { color: #ccc; cursor: default; background: #fafafa; }
    .month-btn.disabled:hover { background: #fafafa; border-color: #ddd; }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .person-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .person-card .name {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e0e0e0;
    }

    .cat-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 3px 0;
      color: #555;
    }
    .cat-row .cat-label { color: #777; }
    .cat-row .cat-value { font-weight: 600; }
    .cat-row .cat-value.has-value { color: #333; }
    .cat-row .cat-value.zero { color: #ccc; }

    .settlement-row {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 700;
      padding: 8px 0 0;
      margin-top: 8px;
      border-top: 2px solid #e0e0e0;
    }
    .settlement-row.plus { color: #2e7d32; }
    .settlement-row.minus { color: #c62828; }
    .settlement-row.zero { color: #666; }

    /* 設定 */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: 500; color: #555; font-size: 14px; }
    .form-group input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .form-group input:focus { outline: none; border-color: #1976D2; }

    .btn {
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }
    .btn-primary { background: #1976D2; }
    .btn-primary:hover { background: #1565C0; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

    .status {
      text-align: center;
      padding: 10px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 14px;
    }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #ffebee; color: #c62828; }

    /* データプレビュー */
    .data-preview-wrap {
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .data-preview {
      font-size: 11px;
      border-collapse: collapse;
      white-space: nowrap;
    }
    .data-preview th, .data-preview td {
      padding: 4px 8px;
      border: 1px solid #eee;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .data-preview th {
      background: #e3f2fd;
      font-weight: 600;
      color: #1565c0;
      position: sticky;
      top: 0;
    }
    .data-preview tr:nth-child(even) { background: #fafafa; }

    /* 列マッピングテーブル */
    .col-mapping-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 12px 0;
    }
    .col-mapping-table th {
      padding: 6px 4px;
      font-size: 11px;
      color: #666;
      font-weight: 600;
      text-align: center;
      border-bottom: 2px solid #e0e0e0;
    }
    .col-mapping-table td {
      padding: 4px;
      text-align: center;
    }
    .col-mapping-table td:first-child {
      text-align: left;
      font-weight: 600;
      color: #1976D2;
      padding-left: 8px;
    }
    .col-mapping-table select {
      width: 100%;
      min-width: 60px;
      padding: 6px 2px;
      font-size: 11px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
    }
    .col-mapping-table select:focus { outline: none; border-color: #1976D2; }

    .back-link {
      display: inline-block;
      margin-bottom: 12px;
      color: #1976D2;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }

    .no-data {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      font-size: 15px;
    }

    .toggle-settings {
      text-align: center;
      margin-top: 12px;
    }
    .toggle-settings a {
      color: #999;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
    }
    .toggle-settings a:hover { color: #666; }

    @media (max-width: 480px) {
      body { padding: 12px; }
      h1 { font-size: 18px; }
      .cards-grid { grid-template-columns: 1fr; }
      .col-mapping-table select { min-width: 50px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">← 入力画面に戻る</a>
  <h1>💰 精算ダッシュボード</h1>

  <!-- ダッシュボード -->
  <div id="dashboardSection" style="display:none">
    <div class="year-tabs" id="yearTabs"></div>
    <div class="month-grid" id="monthGrid"></div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <div class="no-data" id="noData" style="display:none">
    <p>データがありません。下の設定でGAS URLを設定し、データを取得してください。</p>
  </div>

  <!-- 設定 -->
  <div class="toggle-settings" id="toggleSettings" style="display:none">
    <a onclick="toggleSettingsPanel()">⚙️ 設定を表示</a>
  </div>

  <div class="card" id="settingsSection">
    <h2>⚙️ 設定</h2>

    <div class="form-group">
      <label>Google Apps Script URL</label>
      <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/xxxxx/exec">
    </div>
    <button class="btn btn-primary" id="fetchDataBtn" onclick="fetchData()">データ取得</button>

    <div id="dataPreviewSection" style="display:none">
      <h3 style="font-size:14px; margin-top:16px;">データプレビュー</h3>
      <div class="data-preview-wrap" id="dataPreviewWrap"></div>

      <h3 style="font-size:14px; margin-top:16px;">年月の列</h3>
      <p style="font-size:12px; color:#666; margin-bottom:8px;">「2025/01」のような年月が入っている列を選んでください</p>
      <div class="form-group">
        <select id="colYearMonth" style="width:200px; padding:8px; font-size:14px; border:1px solid #ddd; border-radius:6px;"></select>
      </div>

      <h3 style="font-size:14px; margin-top:16px;">列マッピング</h3>
      <p style="font-size:12px; color:#666; margin-bottom:8px;">各人物×カテゴリに対応するサマリーシートの列を選んでください</p>
      <div class="data-preview-wrap">
        <table class="col-mapping-table" id="colMappingTable"></table>
      </div>

      <br>
      <button class="btn btn-primary" onclick="saveConfigAndRender()">設定を保存して表示</button>
    </div>

    <div class="status" id="settingsStatus" style="display:none"></div>
  </div>

  <script>
    // ===== 定数 =====
    const STORAGE_KEYS = {
      gasUrl: 'kakeibo_gas_url',
      dashConfig: 'kakeibo_dash_config',
      dashData: 'kakeibo_dash_data',
    };

    const PEOPLE = [
      { name: '奈津美', cats: ['食費', '日用品', 'くりお', '除外(嗜好品)', 'お小遣い', 'amazon', 'その他'] },
      { name: '敦子', cats: ['食費', '日用品', 'くりお', 'amazon', 'その他'] },
      { name: '道雄', cats: ['食費', '日用品', 'くりお', 'お小遣い', 'その他'] },
    ];
    const ALL_CATEGORIES = [...new Set(PEOPLE.flatMap(p => p.cats))];

    let rawData = null;
    let monthRows = [];
    let selectedYear = null;
    let selectedMonth = null;
    let config = null;

    // ===== 設定管理 =====
    function getDefaultConfig() {
      return {
        colYearMonth: '',
        people: PEOPLE.map(p => ({
          name: p.name,
          totalCol: '',
          cats: Object.fromEntries(p.cats.map(c => [c, ''])),
        })),
      };
    }

    function loadConfig() {
      const saved = localStorage.getItem(STORAGE_KEYS.dashConfig);
      if (saved) {
        config = JSON.parse(saved);
        PEOPLE.forEach(p => {
          let person = config.people.find(cp => cp.name === p.name);
          if (!person) {
            person = { name: p.name, totalCol: '', cats: {} };
            config.people.push(person);
          }
          if (!person.cats) person.cats = {};
          p.cats.forEach(c => { if (!(c in person.cats)) person.cats[c] = ''; });
        });
      } else {
        config = getDefaultConfig();
      }
    }

    function saveConfig() {
      const ymSelect = document.getElementById('colYearMonth');
      config.colYearMonth = ymSelect.value !== '' ? parseInt(ymSelect.value) : '';
      config.people.forEach(person => {
        const personDef = PEOPLE.find(p => p.name === person.name);
        const totalSelect = document.querySelector(`select[data-person="${person.name}"][data-cat="精算"]`);
        if (totalSelect) person.totalCol = totalSelect.value;
        if (personDef) {
          personDef.cats.forEach(cat => {
            const select = document.querySelector(`select[data-person="${person.name}"][data-cat="${cat}"]`);
            if (select) person.cats[cat] = select.value;
          });
        }
      });
      localStorage.setItem(STORAGE_KEYS.dashConfig, JSON.stringify(config));
    }

    // ===== データ取得 =====
    async function fetchData() {
      const gasUrl = document.getElementById('gasUrl').value.trim();
      if (!gasUrl) {
        showSettingsStatus('GAS URLを入力してください', 'error');
        return;
      }
      localStorage.setItem(STORAGE_KEYS.gasUrl, gasUrl);

      const btn = document.getElementById('fetchDataBtn');
      btn.disabled = true;
      btn.textContent = '取得中...';

      try {
        const url = `${gasUrl}?action=readSummary`;
        const response = await fetch(url, { mode: 'cors', redirect: 'follow' });
        if (!response.ok) throw new Error('サーバーエラー');

        const result = await response.json();
        if (!result.success) throw new Error(result.error || '取得失敗');

        rawData = result.data;
        localStorage.setItem(STORAGE_KEYS.dashData, JSON.stringify(rawData));

        showSettingsStatus('データ取得成功', 'success');
        autoDetectMapping();
        showDataPreview();
        renderColMappingTable();
      } catch (error) {
        showSettingsStatus('エラー: ' + error.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'データ取得';
    }

    // ===== ヘッダー行検出 =====
    function findHeaderRow() {
      if (!rawData) return { headerRowIndex: 0, subRowIndex: -1, dataStartRow: 1 };
      for (let i = 0; i < Math.min(rawData.length, 50); i++) {
        for (let j = 0; j < rawData[i].length; j++) {
          if (String(rawData[i][j]).trim() === '年月') {
            // サブヘッダー行の検出（人名などが入った行）
            let subRowIndex = -1;
            if (i + 1 < rawData.length) {
              const nextRow = rawData[i + 1];
              const hasYM = nextRow.some(v => String(v || '').trim().match(/^\d{4}\/\d{1,2}$/));
              const textCount = nextRow.filter(v => {
                const s = String(v || '').trim();
                return s && isNaN(Number(s));
              }).length;
              if (!hasYM && textCount >= 2) subRowIndex = i + 1;
            }

            return {
              headerRowIndex: i,
              subRowIndex,
              dataStartRow: subRowIndex >= 0 ? i + 2 : i + 1,
            };
          }
        }
      }
      return { headerRowIndex: 0, subRowIndex: -1, dataStartRow: 1 };
    }

    // ===== ヘッダー取得（カテゴリ行+人名行を組み合わせ） =====
    function getHeaders() {
      if (!rawData || rawData.length === 0) return [];

      const { headerRowIndex, subRowIndex } = findHeaderRow();
      const headerRow = rawData[headerRowIndex];
      const subRow = subRowIndex >= 0 ? rawData[subRowIndex] : null;
      // ラベルなし列のフォールバック用（ヘッダー行の上の行）
      const preRow = headerRowIndex > 0 ? rawData[headerRowIndex - 1] : null;

      let lastMain = '';
      return headerRow.map((val, i) => {
        const main = val != null ? String(val).trim() : '';
        if (main) lastMain = main;

        const sub = subRow ? (subRow[i] != null ? String(subRow[i]).trim() : '') : '';

        let label;
        if (main && sub) {
          label = `${main} / ${sub}`;
        } else if (!main && sub) {
          label = lastMain ? `${lastMain} / ${sub}` : sub;
        } else if (main) {
          label = main;
        } else {
          label = lastMain ? `${lastMain} (${i})` : `列${i}`;
        }

        // ラベルが「(N)」で終わる場合、上の行から補完を試みる
        if (label.match(/\(\d+\)$/) && preRow) {
          const fallback = preRow[i] != null ? String(preRow[i]).trim() : '';
          if (fallback && !fallback.match(/^\d{4}$/)) {
            label = fallback;
          }
        }

        return { index: i, label };
      });
    }

    // ===== データプレビュー =====
    function showDataPreview() {
      if (!rawData || rawData.length === 0) return;

      document.getElementById('dataPreviewSection').style.display = 'block';

      const headers = getHeaders();
      const { dataStartRow } = findHeaderRow();
      const dataRows = rawData.slice(dataStartRow, dataStartRow + 4);

      let html = '<table class="data-preview"><thead><tr>';
      headers.forEach(h => {
        html += `<th>${h.label}</th>`;
      });
      html += '</tr></thead><tbody>';

      dataRows.forEach((row) => {
        html += '<tr>';
        for (let i = 0; i < headers.length; i++) {
          const val = row[i] != null ? String(row[i]).substring(0, 20) : '';
          html += `<td>${val}</td>`;
        }
        html += '</tr>';
      });
      html += '</tbody></table>';

      document.getElementById('dataPreviewWrap').innerHTML = html;
      buildYearMonthSelect();
    }

    // ===== 年月列セレクト =====
    function buildYearMonthSelect() {
      const select = document.getElementById('colYearMonth');
      const headers = getHeaders();
      select.innerHTML = '<option value="">-- 選択 --</option>';

      let autoDetected = false;
      headers.forEach(h => {
        const opt = document.createElement('option');
        opt.value = h.index;
        opt.textContent = h.label;
        if (String(config.colYearMonth) === String(h.index)) {
          opt.selected = true;
          autoDetected = true;
        }
        select.appendChild(opt);
      });

      // 自動検出: ラベルが「年月」の列を選択
      if (!autoDetected) {
        const ymHeader = headers.find(h => h.label === '年月');
        if (ymHeader) {
          select.value = ymHeader.index;
          config.colYearMonth = ymHeader.index;
        }
      }
    }

    // ===== 列マッピング自動検出 =====
    function autoDetectMapping() {
      const headers = getHeaders();
      if (headers.length === 0) return;

      // 既にマッピングが設定済みならスキップ
      const hasAnyMapping = config.people.some(p =>
        p.totalCol !== '' || Object.values(p.cats).some(v => v !== '')
      );
      if (hasAnyMapping) return;

      const nameAliases = {
        'ひろち': ['ひろち'],
        '奈津美': ['奈津美', 'なつみ'],
        '敦子': ['敦子', 'あつこ'],
        '道雄': ['道雄', 'みちお'],
      };

      function findPerson(label) {
        for (const person of config.people) {
          const aliases = nameAliases[person.name] || [person.name];
          for (const alias of aliases) {
            if (label.includes(alias)) return person;
          }
        }
        return null;
      }

      // 優先順位付きのカテゴリ検出ルール
      const categoryRules = [
        { pattern: /総清算|総精算/, target: 'settlement' },
        { pattern: /くりお/, target: 'くりお' },
        { pattern: /日用品清算|日用品精算/, target: '日用品' },
        { pattern: /嗜好品/, target: '除外(嗜好品)' },
        { pattern: /食費/, target: '食費' },
        { pattern: /お小遣い/, target: 'お小遣い' },
        { pattern: /amazon/i, target: 'amazon' },
      ];

      headers.forEach(h => {
        const person = findPerson(h.label);
        if (!person) return;

        for (const rule of categoryRules) {
          if (rule.pattern.test(h.label)) {
            if (rule.target === 'settlement') {
              if (!person.totalCol) person.totalCol = String(h.index);
            } else if (rule.target in person.cats) {
              if (!person.cats[rule.target]) person.cats[rule.target] = String(h.index);
            }
            return;
          }
        }
      });
    }

    // ===== 列マッピングUI =====
    function buildColSelectOptions(selectedVal) {
      const headers = getHeaders();
      let html = '<option value="">--</option>';
      headers.forEach(h => {
        const sel = String(selectedVal) === String(h.index) ? ' selected' : '';
        html += `<option value="${h.index}"${sel}>${h.label || '列' + h.index}</option>`;
      });
      return html;
    }

    function renderColMappingTable() {
      const table = document.getElementById('colMappingTable');
      const allCols = [...ALL_CATEGORIES, '精算'];

      let html = '<thead><tr><th></th>';
      allCols.forEach(c => { html += `<th>${c}</th>`; });
      html += '</tr></thead><tbody>';

      config.people.forEach(person => {
        const personDef = PEOPLE.find(p => p.name === person.name);
        const personCats = personDef ? personDef.cats : ALL_CATEGORIES;

        html += `<tr><td>${person.name}</td>`;
        ALL_CATEGORIES.forEach(cat => {
          if (personCats.includes(cat)) {
            const val = person.cats[cat] || '';
            html += `<td><select data-person="${person.name}" data-cat="${cat}">${buildColSelectOptions(val)}</select></td>`;
          } else {
            html += '<td style="color:#ccc; font-size:11px; text-align:center;">-</td>';
          }
        });
        const totalVal = person.totalCol || '';
        html += `<td><select data-person="${person.name}" data-cat="精算">${buildColSelectOptions(totalVal)}</select></td>`;
        html += '</tr>';
      });

      html += '</tbody>';
      table.innerHTML = html;
    }

    // ===== データ解析 =====
    function parseMonthRows() {
      if (!rawData) return;
      monthRows = [];
      const colYM = config.colYearMonth !== '' ? config.colYearMonth : 0;

      rawData.forEach((row, i) => {
        const ym = parseYearMonth(row[colYM]);
        if (ym) {
          monthRows.push({ rowIndex: i, ...ym, row });
        }
      });

      monthRows.sort((a, b) => (a.year * 100 + a.month) - (b.year * 100 + b.month));
    }

    function parseYearMonth(value) {
      if (!value) return null;
      const s = String(value);

      const slashMatch = s.match(/^(\d{4})\/(\d{1,2})$/);
      if (slashMatch) return { year: parseInt(slashMatch[1]), month: parseInt(slashMatch[2]) };

      if (s.includes('T')) {
        const d = new Date(s);
        if (!isNaN(d.getTime())) return { year: d.getFullYear(), month: d.getMonth() + 1 };
      }

      return null;
    }

    // ===== ダッシュボード描画 =====
    function renderDashboard() {
      parseMonthRows();

      if (monthRows.length === 0) {
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('noData').style.display = 'block';
        return;
      }

      document.getElementById('noData').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';

      const years = [...new Set(monthRows.map(m => m.year))].sort();

      if (!selectedYear || !selectedMonth) {
        for (let i = monthRows.length - 1; i >= 0; i--) {
          const row = monthRows[i].row;
          const hasData = config.people.some(p => {
            const col = parseInt(p.totalCol);
            return !isNaN(col) && row[col] && row[col] !== 0;
          });
          if (hasData) {
            selectedYear = monthRows[i].year;
            selectedMonth = monthRows[i].month;
            break;
          }
        }
        if (!selectedYear) {
          selectedYear = years[years.length - 1];
          selectedMonth = 1;
        }
      }

      renderYearTabs(years);
      renderMonthGrid();
      renderCards();
    }

    function renderYearTabs(years) {
      const container = document.getElementById('yearTabs');
      container.innerHTML = '';
      years.forEach(year => {
        const btn = document.createElement('button');
        btn.className = 'year-tab' + (year === selectedYear ? ' active' : '');
        btn.textContent = year + '年';
        btn.addEventListener('click', () => {
          selectedYear = year;
          const monthsInYear = monthRows.filter(m => m.year === year).map(m => m.month);
          if (!monthsInYear.includes(selectedMonth)) {
            selectedMonth = monthsInYear[0] || 1;
          }
          renderYearTabs([...new Set(monthRows.map(m => m.year))].sort());
          renderMonthGrid();
          renderCards();
        });
        container.appendChild(btn);
      });
    }

    function renderMonthGrid() {
      const container = document.getElementById('monthGrid');
      container.innerHTML = '';
      const monthsInYear = monthRows.filter(m => m.year === selectedYear).map(m => m.month);

      for (let m = 1; m <= 12; m++) {
        const btn = document.createElement('button');
        const exists = monthsInYear.includes(m);
        btn.className = 'month-btn';
        if (m === selectedMonth) btn.classList.add('active');
        if (!exists) btn.classList.add('disabled');
        btn.textContent = m + '月';
        if (exists) {
          btn.addEventListener('click', () => {
            selectedMonth = m;
            renderMonthGrid();
            renderCards();
          });
        }
        container.appendChild(btn);
      }
    }

    function renderCards() {
      const m = monthRows.find(r => r.year === selectedYear && r.month === selectedMonth);
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';

      if (!m) {
        grid.innerHTML = '<div class="no-data" style="grid-column:1/-1; padding:20px;">この月のデータはありません</div>';
        return;
      }

      config.people.forEach(person => {
        grid.appendChild(createPersonCard(person, m.row));
      });
    }

    function createPersonCard(person, row) {
      const div = document.createElement('div');
      div.className = 'person-card';

      // カテゴリ行を生成（人物別）
      const personDef = PEOPLE.find(p => p.name === person.name);
      const personCats = personDef ? personDef.cats : ALL_CATEGORIES;
      let catsHtml = '';
      personCats.forEach(cat => {
        const col = parseInt(person.cats[cat]);
        const val = !isNaN(col) && col !== '' ? (Number(row[col]) || 0) : null;
        const valText = val !== null ? formatNum(val) : '-';
        const valClass = val === null ? 'zero' : val === 0 ? 'zero' : 'has-value';
        catsHtml += `<div class="cat-row"><span class="cat-label">${cat}</span><span class="cat-value ${valClass}">${valText}</span></div>`;
      });

      // 精算結果
      const totalCol = parseInt(person.totalCol);
      const totalVal = !isNaN(totalCol) ? (Number(row[totalCol]) || 0) : 0;
      const settlementClass = totalVal > 0 ? 'plus' : totalVal < 0 ? 'minus' : 'zero';
      const sign = totalVal > 0 ? '+' : '';

      div.innerHTML = `
        <div class="name">${person.name}</div>
        ${catsHtml}
        <div class="settlement-row ${settlementClass}">
          <span>精算</span>
          <span>${sign}${formatNum(totalVal)}</span>
        </div>
      `;

      return div;
    }

    function formatNum(n) {
      return Math.round(n).toLocaleString() + '円';
    }

    // ===== 設定表示切替 =====
    function toggleSettingsPanel() {
      const el = document.getElementById('settingsSection');
      const link = document.querySelector('#toggleSettings a');
      if (el.style.display === 'none') {
        el.style.display = 'block';
        link.textContent = '⚙️ 設定を非表示';
      } else {
        el.style.display = 'none';
        link.textContent = '⚙️ 設定を表示';
      }
    }

    function saveConfigAndRender() {
      saveConfig();
      showSettingsStatus('設定を保存しました', 'success');
      renderDashboard();
      document.getElementById('settingsSection').style.display = 'none';
      document.getElementById('toggleSettings').style.display = 'block';
      document.querySelector('#toggleSettings a').textContent = '⚙️ 設定を表示';
    }

    function showSettingsStatus(message, type) {
      const el = document.getElementById('settingsStatus');
      el.textContent = message;
      el.className = 'status ' + type;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    // ===== .env読み込み =====
    async function loadEnvFile() {
      try {
        const response = await fetch('.env');
        if (!response.ok) return;
        const text = await response.text();
        text.split('\n').forEach(line => {
          line = line.trim();
          if (!line || line.startsWith('#')) return;
          const eqIndex = line.indexOf('=');
          if (eqIndex <= 0) return;
          const key = line.slice(0, eqIndex).trim();
          const value = line.slice(eqIndex + 1).trim();
          if (!value) return;
          if (key === 'GAS_URL') localStorage.setItem(STORAGE_KEYS.gasUrl, value);
        });
      } catch {}
    }

    // ===== 初期化 =====
    (async () => {
      await loadEnvFile();
      loadConfig();

      const gasUrl = localStorage.getItem(STORAGE_KEYS.gasUrl);
      if (gasUrl) document.getElementById('gasUrl').value = gasUrl;

      const cachedData = localStorage.getItem(STORAGE_KEYS.dashData);
      if (cachedData) {
        rawData = JSON.parse(cachedData);
      }

      if (rawData) autoDetectMapping();

      const hasConfig = config.people.some(p => p.totalCol !== '');
      if (rawData && hasConfig) {
        renderDashboard();
        document.getElementById('settingsSection').style.display = 'none';
        document.getElementById('toggleSettings').style.display = 'block';
      } else {
        if (rawData) {
          showDataPreview();
          renderColMappingTable();
        } else {
          renderColMappingTable();
        }
      }
    })();
  </script>
</body>
</html>
